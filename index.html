<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hello World</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Inter:wght@300&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      background: #050510;
      overflow: hidden;
      font-family: 'Inter', sans-serif;
    }

    canvas {
      position: fixed;
      inset: 0;
    }

    .content {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      pointer-events: none;
    }

    h1 {
      font-family: 'Pacifico', cursive;
      font-size: clamp(3rem, 10vw, 7rem);
      background: linear-gradient(120deg, #a78bfa, #60a5fa, #34d399, #60a5fa, #a78bfa);
      background-size: 300% 300%;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: gradientShift 6s ease infinite, floatY 4s ease-in-out infinite;
      filter: drop-shadow(0 0 30px rgba(167, 139, 250, 0.4));
    }

    .wave {
      display: inline-block;
      -webkit-text-fill-color: initial;
      animation: wave 1.5s ease-in-out infinite;
      transform-origin: 70% 70%;
    }

    .subtitle {
      margin-top: 1.5rem;
      font-size: clamp(0.75rem, 2vw, 1rem);
      letter-spacing: 0.4em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.35);
      animation: fadeUp 1.5s ease 0.4s both;
    }

    .avatar {
      width: 160px;
      height: 160px;
      border-radius: 50%;
      object-fit: cover;
      object-position: center top;
      border: 3px solid rgba(167, 139, 250, 0.5);
      box-shadow: 0 0 30px rgba(167, 139, 250, 0.35), 0 0 60px rgba(96, 165, 250, 0.2);
      animation: fadeUp 1.5s ease 0.2s both, floatY 4s ease-in-out infinite;
      margin-bottom: 1.5rem;
    }

    .orb {
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.15;
      animation: drift linear infinite;
      pointer-events: none;
    }

    @keyframes gradientShift {
      0%, 100% { background-position: 0% 50%; }
      50%       { background-position: 100% 50%; }
    }

    @keyframes floatY {
      0%, 100% { transform: translateY(0); }
      50%       { transform: translateY(-12px); }
    }

    @keyframes wave {
      0%, 100% { transform: rotate(0deg); }
      20%       { transform: rotate(-15deg); }
      40%       { transform: rotate(14deg); }
      60%       { transform: rotate(-10deg); }
      80%       { transform: rotate(8deg); }
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes drift {
      0%   { transform: translate(0, 0) scale(1); }
      33%  { transform: translate(60px, -40px) scale(1.1); }
      66%  { transform: translate(-40px, 30px) scale(0.95); }
      100% { transform: translate(0, 0) scale(1); }
    }
  </style>
</head>
<body>

  <!-- Ambient orbs -->
  <div class="orb" style="width:500px;height:500px;background:#7c3aed;top:10%;left:5%;animation-duration:18s;"></div>
  <div class="orb" style="width:400px;height:400px;background:#2563eb;bottom:10%;right:8%;animation-duration:22s;animation-delay:-8s;"></div>
  <div class="orb" style="width:300px;height:300px;background:#059669;top:50%;left:50%;animation-duration:15s;animation-delay:-4s;"></div>

  <canvas id="c"></canvas>

  <div class="content">
    <img class="avatar" src="me.png" alt="Ryan">
    <h1>Hi, my name is Ryan <span class="wave">👋</span></h1>
    <p class="subtitle">glad you could make it</p>
  </div>

  <script>
    // --- Particle constellation ---
    const canvas = document.getElementById('c');
    const ctx = canvas.getContext('2d');
    let W, H, particles;
    const PARTICLE_COUNT = 120;
    const MAX_DIST = 140;
    let mouse = { x: -9999, y: -9999 };

    function resize() {
      W = canvas.width  = window.innerWidth;
      H = canvas.height = window.innerHeight;
    }

    class Particle {
      constructor() { this.reset(true); }
      reset(init) {
        this.x  = Math.random() * W;
        this.y  = Math.random() * H;
        this.vx = (Math.random() - 0.5) * 0.4;
        this.vy = (Math.random() - 0.5) * 0.4;
        this.r  = Math.random() * 1.8 + 0.5;
        this.alpha = Math.random() * 0.5 + 0.3;
        // Pick a color from the palette
        const hues = [260, 220, 160];
        this.hue = hues[Math.floor(Math.random() * hues.length)];
      }
      update() {
        // Gentle mouse repulsion
        const dx = this.x - mouse.x;
        const dy = this.y - mouse.y;
        const d  = Math.sqrt(dx*dx + dy*dy);
        if (d < 120) {
          this.vx += (dx / d) * 0.3;
          this.vy += (dy / d) * 0.3;
        }
        // Speed cap
        const speed = Math.sqrt(this.vx*this.vx + this.vy*this.vy);
        if (speed > 1.8) { this.vx *= 0.95; this.vy *= 0.95; }

        this.x += this.vx;
        this.y += this.vy;

        // Wrap edges
        if (this.x < 0) this.x = W;
        if (this.x > W) this.x = 0;
        if (this.y < 0) this.y = H;
        if (this.y > H) this.y = 0;
      }
      draw() {
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.r, 0, Math.PI * 2);
        ctx.fillStyle = `hsla(${this.hue}, 80%, 75%, ${this.alpha})`;
        ctx.fill();
      }
    }

    function init() {
      resize();
      particles = Array.from({ length: PARTICLE_COUNT }, () => new Particle());
    }

    function drawLines() {
      for (let i = 0; i < particles.length; i++) {
        for (let j = i + 1; j < particles.length; j++) {
          const dx = particles[i].x - particles[j].x;
          const dy = particles[i].y - particles[j].y;
          const d  = Math.sqrt(dx*dx + dy*dy);
          if (d < MAX_DIST) {
            const opacity = (1 - d / MAX_DIST) * 0.25;
            ctx.beginPath();
            ctx.moveTo(particles[i].x, particles[i].y);
            ctx.lineTo(particles[j].x, particles[j].y);
            ctx.strokeStyle = `rgba(180, 160, 255, ${opacity})`;
            ctx.lineWidth = 0.8;
            ctx.stroke();
          }
        }
      }
    }

    function loop() {
      ctx.clearRect(0, 0, W, H);
      particles.forEach(p => { p.update(); p.draw(); });
      drawLines();
      requestAnimationFrame(loop);
    }

    window.addEventListener('resize', () => { resize(); });
    window.addEventListener('mousemove', e => { mouse.x = e.clientX; mouse.y = e.clientY; });
    window.addEventListener('mouseleave', () => { mouse.x = -9999; mouse.y = -9999; });

    init();
    loop();
  </script>
</body>
</html>
